[settings]
database = "data/radar.db"
reports_dir = "reports"
texts_dir = "data/texts"
audio_dir = "data/audio"
transcripts_dir = "data/transcripts"
max_items_per_source = 0
only_today = true
local_timezone = "Asia/Shanghai"
fetch_full_pages = false
download_audio = true
transcribe_audio = true
delete_audio_after_transcription = true
max_transcriptions_per_run = 0
whisper_model = "models/ggml-small.bin"
whisper_language = "zh"
whisper_command = "/opt/homebrew/bin/whisper-cli"
ffmpeg_command = "/opt/homebrew/bin/ffmpeg"
summary_mode = "llm"
max_llm_summaries_per_run = 0
summaries_dir = "data/summaries"
llm_base_url = "https://api.openai.com/v1"
llm_model = "gpt-4.1-mini"
llm_api_key_env = "OPENAI_API_KEY"
llm_keychain_service = "invest-radar-openai-api-key"
llm_keychain_account = "openai"
llm_reasoning_effort = "low"
llm_verbosity = "medium"
llm_timeout_seconds = 300
llm_max_chars_per_chunk = 12000
summary_sentences = 8
keywords = [
  "AI",
  "ETF",
  "IPO",
  "A股",
  "港股",
  "美股",
  "股票",
  "基金",
  "债券",
  "黄金",
  "白银",
  "原油",
  "汇率",
  "美元",
  "美债",
  "利率",
  "降息",
  "通胀",
  "估值",
  "财报",
  "现金流",
  "半导体",
  "芯片",
  "新能源",
  "消费",
  "医药",
  "银行",
  "地产",
  "红利",
  "风险",
]

